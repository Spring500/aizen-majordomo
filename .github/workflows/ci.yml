name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      CI_STEP_TIMINGS_FILE: ${{ runner.temp }}/ci-step-timings.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: node scripts/ci-step.mjs --name "Install dependencies" -- pnpm install --frozen-lockfile

      - name: Run Vitest
        run: node scripts/ci-step.mjs --name "Run Vitest" -- pnpm test

      - name: Build web
        run: node scripts/ci-step.mjs --name "Build web" -- pnpm build:web

      - name: Install Playwright Chromium
        run: node scripts/ci-step.mjs --name "Install Playwright Chromium" -- pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        run: node scripts/ci-step.mjs --name "Run Playwright" -- pnpm test:e2e

      - name: Publish CI timing summary
        if: always()
        run: |
          {
            echo "## CI step timings"
            echo ""
            echo "| Step | Status | Duration | Command |"
            echo "| --- | --- | ---: | --- |"
            if [ -f "$CI_STEP_TIMINGS_FILE" ]; then
              cat "$CI_STEP_TIMINGS_FILE"
            else
              echo "| No timed steps recorded | FAIL missing data | 0ms | \`CI_STEP_TIMINGS_FILE\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
