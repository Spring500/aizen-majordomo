name: Validate commit message format

on:
  push:
    branches:
      - main

jobs:
  commit-messages:
    name: Validate commit message format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify main commit messages
        run: node scripts/verify-range-messages.mjs "${{ github.event.before }}..${{ github.sha }}"
